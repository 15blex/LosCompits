<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <script>
      (() => {
        const localeStorageKey = "compits_locale";
        const colorSchemeStorageKey = "compits_colorScheme";
        const locales = new Set(["es", "cat", "it", "de", "fr", "en"]);
        const colorSchemes = new Set(["light", "dark"]);

        try {
          const storedLocale = localStorage.getItem(localeStorageKey);
          if (storedLocale && locales.has(storedLocale)) {
            document.documentElement.lang = storedLocale;
          }

          const storedColorScheme = localStorage.getItem(colorSchemeStorageKey);
          if (storedColorScheme && colorSchemes.has(storedColorScheme)) {
            document.documentElement.style.colorScheme = storedColorScheme;
          }
        } catch {}
      })();
    </script>
    %sveltekit.head%
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://www.loscompits.es/#website",
            "url": "https://www.loscompits.es/",
            "name": "Los Compits",
            "description": "Grupo de músicos de Barcelona que interpreta cumbia, salsa y son cubano para eventos, calles y celebraciones.",
            "inLanguage": "es-ES"
          },
          {
            "@type": "WebPage",
            "@id": "https://www.loscompits.es/#webpage",
            "url": "https://www.loscompits.es/",
            "name": "Los Compits | Cumbia, Salsa y Son Cubano en Barcelona",
            "description": "Grupo de músicos de Barcelona que interpreta cumbia, salsa y son cubano para eventos, calles y celebraciones.",
            "inLanguage": "es-ES",
            "isPartOf": {
              "@id": "https://www.loscompits.es/#website"
            },
            "about": {
              "@id": "https://www.loscompits.es/#musicgroup"
            }
          },
          {
            "@type": "MusicGroup",
            "@id": "https://www.loscompits.es/#musicgroup",
            "url": "https://www.loscompits.es/",
            "name": "Los Compits",
            "description": "Grupo de músicos de Barcelona que interpreta cumbia, salsa y son cubano para eventos, calles y celebraciones.",
            "genre": ["Cumbia", "Salsa", "Son Cubano"],
            "foundingLocation": {
              "@type": "Place",
              "name": "Barcelona"
            },
            "areaServed": {
              "@type": "Place",
              "name": "Barcelona"
            }
          }
        ]
      }
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
